[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

upload_port = COM4
upload_speed = 115200

monitor_port = COM4
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    adafruit/Adafruit PCD8544 Nokia 5110 LCD library@^2.0.3
    adafruit/Adafruit GFX Library@^1.11.9
